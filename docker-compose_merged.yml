services:
  # 1. Сервис Базы Данных
  db:
    image: postgres:14-alpine
    container_name: hakaton-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"

  # 2. Сервис Бэкенда
  backend:
    build: ./backend
    container_name: hakaton-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS}
      YOUTUBE_API_TOKEN: ${YOUTUBE_API_TOKEN}
      RUTUBE_API_TOKEN: ${RUTUBE_API_TOKEN}
      VIMEO_API_TOKEN: ${VIMEO_API_TOKEN}

  # 3. Сервис Телеграм-бота
  bot:
    build: ./bot
    container_name: hakaton-bot
    depends_on:
      - db
      - backend
    environment:
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

volumes:
  postgres_data:
